name: SiyahambaClient
options:
  bundleIdPrefix: com.siyahamba
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

packages:
  JWTDecode:
    url: https://github.com/auth0/JWTDecode.swift
    majorVersion: 4.0.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    majorVersion: 0.9.0
  DSWaveformImage:
    url: https://github.com/dmrschmidt/DSWaveformImage
    from: 14.0.0

targets:
  SiyahambaClient:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: SiyahambaClient
        excludes:
          - "**/*.md"
    info:
      path: SiyahambaClient/Info.plist
      properties:
        CFBundleName: SiyahambaClient
        CFBundleIdentifier: com.siyahamba.client
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSMinimumSystemVersion: "14.0"
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundlePackageType: APPL
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siyahamba.client
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: SiyahambaClient/Info.plist
    dependencies:
      - package: JWTDecode
      - package: ZIPFoundation
      - package: DSWaveformImage
        product: DSWaveformImageViews

  SiyahambaClientTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - SiyahambaClientTests
    info:
      path: SiyahambaClientTests/Info.plist
      properties:
        CFBundleName: SiyahambaClientTests
        CFBundleIdentifier: com.siyahamba.client.tests
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siyahamba.client.tests
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: SiyahambaClientTests/Info.plist
    dependencies:
      - target: SiyahambaClient
