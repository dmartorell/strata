name: Siyahamba
options:
  bundleIdPrefix: com.siyahamba
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

packages:
  JWTDecode:
    url: https://github.com/auth0/JWTDecode.swift
    majorVersion: 4.0.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    majorVersion: 0.9.0
  DSWaveformImage:
    url: https://github.com/dmrschmidt/DSWaveformImage
    from: 14.0.0

targets:
  Siyahamba:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Siyahamba
        excludes:
          - "**/*.md"
    info:
      path: Siyahamba/Info.plist
      properties:
        CFBundleName: Siyahamba
        CFBundleIdentifier: com.siyahamba.client
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        LSMinimumSystemVersion: "14.0"
        NSMicrophoneUsageDescription: "Siyahamba necesita acceso al micrófono para el afinador de guitarra"
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundlePackageType: APPL
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siyahamba.client
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        INFOPLIST_FILE: Siyahamba/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Siyahamba/Siyahamba.entitlements
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
    dependencies:
      - package: JWTDecode
      - package: ZIPFoundation
      - package: DSWaveformImage
        product: DSWaveformImageViews

  SiyahambaTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - SiyahambaTests
    info:
      path: SiyahambaTests/Info.plist
      properties:
        CFBundleName: SiyahambaTests
        CFBundleIdentifier: com.siyahamba.client.tests
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.siyahamba.client.tests
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: ""
        INFOPLIST_FILE: SiyahambaTests/Info.plist
    dependencies:
      - target: Siyahamba
